exclude: |
  (?x)^(
    home/dot_local/share/blocks/.*\.(c|h)$|
    .*\.tmpl$
  )$
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.11
  hooks:
    - id: ruff-check
      args: ["--fix"]
- repo: https://github.com/pycqa/isort
  rev: 9.0.0a3
  hooks:
    - id: isort
      name: isort (python)
      args: ["--profile", "black"]
- repo: https://github.com/psf/black
  rev: 26.3.1
  hooks:
    - id: black
- repo: local
  hooks:
    - id: shfmt
      name: Run shfmt
      entry: shfmt
      args: [
        "-i",
        "4",
        "-w"
      ]
      language: system
      pass_filenames: true
      types: [shell]
      exclude: ^home/dot_zsh/
