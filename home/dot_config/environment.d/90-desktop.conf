# systemd --user environment. Loaded once at login (pam_systemd), propagated
# into sway via the import-environment call in wm/session.

TERMINAL=alacritty
GTK_THEME=Materia-dark-compact
GTK_OVERLAY_SCROLLING=0

# gcr-ssh-agent.service listens on this socket (%t = XDG_RUNTIME_DIR).
SSH_AUTH_SOCK=%t/gcr/ssh
