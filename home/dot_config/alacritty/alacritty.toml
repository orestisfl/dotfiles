[keyboard]
bindings = [
    # { key = "F11", mods = "None", action = "ToggleFullscreen" },
    { key = "F11", mods = "None", action = "ToggleViMode" },
    { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" },
    { key = "Return", mods = "Shift", chars = "\u001B\r" },
]

[cursor]
style = { blinking = "On" }
vi_mode_style = { blinking = "Off" }

[[hints.enabled]]
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
hyperlinks = true
action = "copy"
post_processing = true
mouse = { enabled = true, mods = "Shift" }

[[hints.enabled]]
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
hyperlinks = true
# gio open honours Terminal=true desktop entries via xdg-terminal-exec;
# xdg-open on sway falls into its "generic" path which ignores Terminal=true
# and launches terminal apps like nvim detached with no TTY.
command = { program = "gio", args = ["open"] }
post_processing = true
mouse = { enabled = true, mods = "None" }

[scrolling]
history = 50000

[font]
size = 10
